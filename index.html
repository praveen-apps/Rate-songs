<!DOCTYPE html>
<html lang="en">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2ecc71">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/727/727218.png">
 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Audio Ratings</title>
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #F7F6F2;
            --card-bg: #FFFFFF;
            --text-main: #5C5C5C;
            --accent-green: #2ecc71; /* Interactive elements in green */
            --accent-hover: #27ae60;
            --border-color: #E2DFD6;
            --input-bg: #FAFAFA;
            --track-hover: #F9F9F9;
            --log-text: #888888;
        }

        /* Dark Theme Variables */
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --border-color: #333333;
            --input-bg: #2a2a2a;
            --track-hover: #2d2d2d;
            --log-text: #aaaaaa;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 { font-weight: 300; margin: 0; }
        
        .theme-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .theme-btn:hover { border-color: var(--accent-green); color: var(--accent-green); }

        .sub-text { font-size: 13px; color: var(--log-text); margin-bottom: 20px; text-align: left;}

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            outline: none;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus { border-color: var(--accent-green); }

        button.primary-btn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }

        button.primary-btn:hover { background-color: var(--accent-hover); }

        #resultsList {
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .track-item {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            font-size: 13px;
            transition: background-color 0.2s;
        }
        .track-item:hover { background-color: var(--track-hover); }

        audio { width: 100%; margin-top: 10px; outline: none; }

        /* Custom Circular Rating Styles */
        #ratingArea {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .circular-chart {
            display: block;
            margin: 15px auto;
            max-width: 120px;
            max-height: 120px;
        }

        .circle-bg {
            fill: none;
            stroke: var(--border-color);
            stroke-width: 3;
        }

        .circle {
            fill: none;
            stroke-width: 2.8;
            stroke-linecap: round;
            /* The transition makes the stroke smoothly animate to its destination */
            transition: stroke-dasharray 0.8s ease-out, stroke 0.4s ease;
        }

        .percentage {
            fill: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.5em;
            text-anchor: middle;
            font-weight: bold;
        }

        .slider-container { margin: 15px 0; }

        input[type="range"] {
            width: 80%;
            accent-color: var(--accent-green);
            cursor: pointer;
        }

        .log-section {
            margin-top: 25px;
            text-align: left;
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        
        .rating-entry {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 8px;
            background: var(--input-bg);
            border-radius: 8px;
        }

        .rating-badge {
            font-weight: bold;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            margin-right: 10px;
            font-size: 12px;
            min-width: 30px;
            text-align: center;
        }
        .rating-entry {
        display: flex;
        align-items: center;
        justify-content: space-between; /* Space for the delete button */
        margin-bottom: 8px;
        padding: 8px;
        background: var(--input-bg);
        border-radius: 8px;
        transition: opacity 0.4s ease, transform 0.4s ease; /* Physics for deletion */
    }

    /* Animation class for deleting */
    .deleting {
        opacity: 0;
        transform: translateX(20px);
        pointer-events: none;
    }

    .delete-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        opacity: 0.5;
        transition: opacity 0.2s, transform 0.2s;
        padding: 5px;
        color: var(--text-main);
    }

    .delete-btn:hover {
        opacity: 1;
        color: #e74c3c;
        transform: scale(1.2);
    }

    .entry-content {
        display: flex;
        align-items: center;
        flex-grow: 1;
    }
    
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1>Zen Audio</h1>
        <button class="theme-btn" id="themeToggle" title="Toggle Dark/Light Mode">☯</button>
    </div>
    <p class="sub-text">Search a track and rate the 30s preview.</p>

    <input type="text" id="searchInput" placeholder="Search song or artist...">
    <button id="searchBtn" class="primary-btn">Search Previews</button>

    <div id="resultsList"></div>

    <audio id="audioPlayer" controls></audio>

    <div id="ratingArea">
        <div style="font-size: 14px; font-weight: 600;">Rate this track</div>
        
        <svg viewBox="0 0 36 36" class="circular-chart">
            <path class="circle-bg"
                d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831"
            />
            <path class="circle" id="ratingCircle"
                stroke-dasharray="0, 100"
                stroke="#e74c3c"
                d="M18 2.0845
                a 15.9155 15.9155 0 0 1 0 31.831
                a 15.9155 15.9155 0 0 1 0 -31.831"
            />
            <text x="18" y="20.35" class="percentage" id="ratingText">0.0</text>
        </svg>

        <div class="slider-container">
            <input type="range" id="ratingSlider" min="0" max="10" step="0.1" value="0">
        </div>

        <button id="saveRatingBtn" class="primary-btn" style="margin-bottom: 0;">Save Rating</button>
    </div>

    <div class="log-section">
        <div style="font-weight:600; margin-bottom:10px;">Your Ratings</div>
        <div id="ratingLog" style="color:var(--log-text);">No ratings yet.</div>
    </div>
</div>

<script>
    // Elements
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsList = document.getElementById('resultsList');
    const audioPlayer = document.getElementById('audioPlayer');
    const ratingArea = document.getElementById('ratingArea');
    const ratingLog = document.getElementById('ratingLog');
    const themeToggle = document.getElementById('themeToggle');
    
    // Rating Elements
    const ratingSlider = document.getElementById('ratingSlider');
    const ratingCircle = document.getElementById('ratingCircle');
    const ratingText = document.getElementById('ratingText');
    const saveRatingBtn = document.getElementById('saveRatingBtn');

    let currentTrackName = "";
    let currentArtist = "";

    // Dark/Light Mode Toggle
    themeToggle.onclick = () => {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    };

    // Search Logic
    // ... (keep all your variables at the top the same)

// Updated Search Logic
searchBtn.onclick = async () => {
    const query = searchInput.value.trim();
    if (!query) return;

    // Stop current music when searching for something new
    audioPlayer.pause();
    audioPlayer.src = "";

    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=5`;
    const resp = await fetch(url);
    const data = await resp.json();

    resultsList.innerHTML = "";
    data.results.forEach(track => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.innerHTML = `<strong>${track.trackName}</strong><br><span style="color:var(--log-text)">${track.artistName}</span>`;
        item.onclick = () => {
            currentTrackName = track.trackName;
            currentArtist = track.artistName;
            audioPlayer.src = track.previewUrl;
            audioPlayer.play();
            ratingArea.style.display = "block";
            resetRating();
        };
        resultsList.appendChild(item);
    });
};

// ... (keep getRatingColor, updateRatingVisuals, and resetRating the same)

// ONLY ONE Save Rating function (the one with delete logic)
saveRatingBtn.onclick = () => {
    const finalVal = parseFloat(ratingSlider.value).toFixed(1);
    const color = getRatingColor(finalVal);

    if (ratingLog.innerHTML === "No ratings yet.") {
        ratingLog.innerHTML = "";
    }

    const entry = document.createElement('div');
    entry.className = 'rating-entry';
    
    entry.innerHTML = `
        <div class="entry-content">
            <span class="rating-badge" style="background-color: ${color}">${finalVal}</span>
            <div>
                <strong>${currentTrackName}</strong><br>
                <span style="font-size:11px; color:var(--log-text);">${currentArtist}</span>
            </div>
        </div>
        <button class="delete-btn" title="Delete Rating">⛌</button>
    `;

    const delBtn = entry.querySelector('.delete-btn');
    delBtn.onclick = () => {
        entry.classList.add('deleting');
        setTimeout(() => {
            entry.remove();
            if (ratingLog.children.length === 0) {
                ratingLog.innerHTML = "No ratings yet.";
            }
        }, 400);
    };

    ratingLog.prepend(entry);
};

// PWA Service Worker Registration
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
            .then(reg => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Failed', err));
    });
}

    
</script>

</body>
</html>
